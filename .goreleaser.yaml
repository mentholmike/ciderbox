version: 2

project_name: ciderbox

changelog:
  disable: true

builds:
  - id: ciderbox
    main: ./cmd/ciderbox
    binary: ciderbox
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mentholmike/ciderbox/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

archives:
  - id: ciderbox
    ids:
      - ciderbox
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: ciderbox
    ids:
      - ciderbox
    repository:
      owner: mentholmike
      name: homebrew-ciderbox
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: mentholmike-bot
      email: bot@michaelsmacmini.local
    commit_msg_template: "brew: update ciderbox to {{ .Tag }}"
    homepage: https://ciderbox.dev
    description: Apple-native throwaway dev environments using container CLI
    license: MIT
    install: |
      bin.install "ciderbox"
    test: |
      system bin/"ciderbox", "--version"
